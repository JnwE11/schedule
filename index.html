<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FBF7F0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="我的日程">
  <link rel="manifest" href="manifest.json">
  <title>我的日程</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ 主容器 ═══ -->
  <div class="app-container">

    <!-- ── 左侧栏（桌面端） ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <!-- 问候 -->
        <div class="greeting-block">
          <div class="greeting-row">
            <p class="greeting" id="greetingText">下午好</p>
            <button class="btn-icon settings-btn" id="btnSettings">⚙️</button>
          </div>
          <h1 class="today-label" id="todayLabel">6月1日 星期日</h1>
        </div>

        <!-- 下一个日程 Hero Card -->
        <div class="hero-card" id="heroCard">
          <div class="hero-card-inner">
            <span class="hero-badge">下一个日程</span>
            <h2 class="hero-title" id="heroTitle">暂无日程</h2>
            <p class="hero-time" id="heroTime">添加你的第一个日程吧</p>
            <div class="hero-countdown hidden" id="heroCountdown">
              <span class="hero-cd-num" id="heroCdNum">--</span>
              <span class="hero-cd-unit" id="heroCdUnit"></span>
            </div>
          </div>
          <span class="hero-arrow">→</span>
        </div>

        <!-- 今日概览 -->
        <div class="digest-card" id="digestCard">
          <div class="digest-header">
            <h3 class="digest-title">📰 今日概览</h3>
            <span class="digest-date" id="digestDate">6月1日</span>
          </div>
          <div class="digest-body" id="digestBody">
            <p class="digest-empty">今天没有日程 ☀️</p>
          </div>
          <div class="digest-footer hidden" id="digestFooter">
            <span class="digest-tomorrow">明天</span>
            <span class="digest-tomorrow-text" id="digestTomorrow">--</span>
          </div>
        </div>

        <!-- 快速粘贴入口 -->
        <div class="quick-paste" id="quickPaste">
          <div class="img-preview hidden" id="imgPreview">
            <img id="imgPreviewImg" src="" alt="截图预览">
            <button class="img-preview-close" id="imgPreviewClose">✕</button>
            <button class="btn btn-primary btn-ocr hidden" id="btnOCR">🔍 OCR 识别文字</button>
          </div>
          <textarea id="pasteInput" placeholder="粘贴聊天消息，或直接粘贴截图..." rows="2"></textarea>
          <div class="quick-actions">
            <input type="file" id="fileInput" accept=".txt,.png,.jpg,.jpeg,.gif,.webp" hidden>
            <button class="btn btn-ghost" id="btnUpload">📎</button>
            <button class="btn btn-primary" id="btnExtract">智能提取</button>
            <button class="btn btn-ghost btn-ai-badge" id="btnAiToggle">本地</button>
          </div>
          <div id="extractResults" class="extract-results hidden"></div>
        </div>
      </div>
    </aside>

    <!-- ── 右侧主内容区 ── -->
    <main class="main-content">

      <!-- 标签栏 -->
      <nav class="tab-bar" id="tabBar">
        <button class="tab active" data-tab="schedule">📋 日程</button>
        <button class="tab" data-tab="calendar">📅 月历</button>
        <button class="tab" data-tab="countdown">⏳ 倒计时</button>
      </nav>

      <!-- 日程列表面板 -->
      <section class="tab-panel active" id="panel-schedule">
        <div class="filter-bar" id="filterBar"></div>
        <div class="schedule-date-group" id="scheduleList">
          <div class="empty-state">
            <div class="empty-icon-wrap">☀️</div>
            <p class="empty-title">新的一天</p>
            <p class="empty-desc">在上方粘贴一条消息<br>或点月历中的日期来添加日程</p>
          </div>
        </div>
      </section>

      <!-- 月历面板 -->
      <section class="tab-panel" id="panel-calendar">
        <div class="cal-nav">
          <button class="btn-icon" id="btnPrevMonth">◀</button>
          <span class="cal-month-title" id="monthTitle">2025年6月</span>
          <button class="btn-icon" id="btnNextMonth">▶</button>
          <button class="btn-icon btn-today" id="btnToday">今天</button>
          <div class="view-toggle">
            <button class="view-btn active" data-view="month">月</button>
            <button class="view-btn" data-view="week">周</button>
          </div>
        </div>
        <!-- 月视图 -->
        <div class="calendar" id="calendarWrap">
          <div class="weekdays">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
          </div>
          <div class="days-grid" id="daysGrid"></div>
        </div>
        <!-- 周视图 -->
        <div class="week-view hidden" id="weekView">
          <div class="week-scroll">
            <div class="week-header" id="weekHeader"></div>
            <div class="week-body" id="weekBody"></div>
          </div>
        </div>
        <!-- 选中日期的日程 -->
        <div class="day-events" id="dayEvents"></div>
      </section>

      <!-- 倒计时面板 -->
      <section class="tab-panel" id="panel-countdown">
        <div class="countdown-list" id="countdownList">
          <div class="empty-state">
            <div class="empty-icon-wrap">⏳</div>
            <p class="empty-title">没有倒计时</p>
            <p class="empty-desc">添加日程后这里会自动显示</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- ═══ 添加按钮（移动端浮动） ═══ -->
  <button class="fab" id="fabAdd" title="添加日程">+</button>

  <!-- ═══ 日程弹窗 ═══ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">新日程</h3>
      <form id="eventForm">
        <input type="hidden" id="eventId">
        <label>事件名称</label>
        <input type="text" id="eventTitle" placeholder="例如：团队周会" required>
        <div class="form-row">
          <div class="form-col">
            <label>日期</label>
            <input type="date" id="eventDate" required>
          </div>
          <div class="form-col">
            <label>开始</label>
            <input type="time" id="eventTime">
          </div>
        </div>
        <div class="form-row">
          <div class="form-col">
            <label>结束</label>
            <input type="time" id="eventEndTime">
          </div>
          <div class="form-col form-col-hint">
            <span class="duration-hint" id="durationHint">约 1 小时</span>
          </div>
        </div>
        <label>分类</label>
        <div class="cat-picker" id="catPicker">
          <button type="button" class="cat-chip" data-cat="default">📌 默认</button>
          <button type="button" class="cat-chip" data-cat="work">💼 工作</button>
          <button type="button" class="cat-chip" data-cat="life">🏠 生活</button>
          <button type="button" class="cat-chip" data-cat="urgent">🚨 紧急</button>
        </div>
        <label>备注</label>
        <textarea id="eventNote" rows="2" placeholder="可选..."></textarea>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btnCancel">取消</button>
          <button type="button" class="btn btn-danger hidden" id="btnDelete">删除</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══ 设置弹窗 ═══ -->
  <div class="modal-overlay hidden" id="settingsOverlay">
    <div class="modal">
      <h3>设置</h3>

      <label>数据</label>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" id="btnExport">导出备份</button>
        <button class="btn btn-ghost btn-sm" id="btnImport">导入备份</button>
      </div>

      <p class="mode-status">状态：AI <strong id="currentMode">--</strong> ｜ 云同步 <span class="sync-status" id="syncStatus">--</span></p>
      <div class="sync-row">
        <button class="btn btn-primary btn-sm" id="btnSyncNow">🔄 强制同步</button>
      </div>

      <hr>

      <label>🏷️ 自定义分类</label>
      <div class="cat-manage" id="catManage"></div>
      <div class="cat-add-row">
        <input type="text" id="newCatLabel" placeholder="分类名称" maxlength="6">
        <input type="color" id="newCatColor" value="#6B9CC8">
        <button class="btn btn-primary btn-sm" id="btnAddCat">+ 添加</button>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="btnSettingsClose">关闭</button>
        <button type="button" class="btn btn-primary" id="btnSaveSettings">保存</button>
      </div>
    </div>
  </div>

  <input type="file" id="importFileInput" accept=".json" hidden>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="extractor.js"></script>
  <script src="ai-extractor.js"></script>
  <script src="app.js"></script>
</body>
</html>
